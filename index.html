<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ops Hub Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX transformation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Helper for Lucide icons in HTML/React hybrid
        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        // --- SHARED UTILS ---
        const parseVal = (v) => {
            if (v === null || v === undefined) return 0;
            const strValue = String(v);
            const parsed = parseFloat(strValue.replace(/[^0-9.-]+/g, ""));
            return isNaN(parsed) ? 0 : parsed;
        };

        const ABM_ORDER = [
            "Palak Chouhan", "Abhin Anilkumar Patel", "Akshay Rajaram Kushare", "Balu Laxmandhamane",
            "Ishwar", "Nitin Valmik Date", "Vikrant", "Vishal", "Omkar", "Manikandan", "Jitendra",
            "Abhishek Tiwari", "Sudhir KumarPavan", "Nagendra", "Sachin", "Nanda Kishore", "Central"
        ];

        const sortABMs = (a, b) => {
            const indexA = ABM_ORDER.indexOf(a);
            const indexB = ABM_ORDER.indexOf(b);
            if (indexA !== -1 && indexB !== -1) return indexA - indexB;
            if (indexA !== -1) return -1;
            if (indexB !== -1) return 1;
            return (a || '').localeCompare(b || '');
        };

        const getTradePeriodType = (gmvMonth, tradeMonth, filterMonth) => {
            if (!filterMonth || !gmvMonth || !tradeMonth) return null;
            if (gmvMonth !== filterMonth) return null;
            if (gmvMonth === tradeMonth) return 'executed';
            return 'carryforward';
        };

        // --- COMPONENT: DRILL DOWN PANEL ---
        const DrillDownPanel = ({ isOpen, onClose, title, trades, paymentsMap }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex justify-end bg-slate-900/40 backdrop-blur-sm">
                    <div className="w-full max-w-6xl bg-white h-full shadow-2xl flex flex-col animate-in">
                        <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                            <div>
                                <h3 className="text-xl font-black text-slate-800 uppercase tracking-tight">{title}</h3>
                                <p className="text-xs text-slate-500 font-bold uppercase tracking-widest">{trades.length} Records Found</p>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-slate-200 rounded-full transition-colors">
                                <Icon name="x" size={24} />
                            </button>
                        </div>
                        <div className="flex-1 overflow-auto p-6">
                            <table className="w-full text-left border-collapse">
                                <thead className="bg-slate-50 sticky top-0 z-10 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                    <tr>
                                        <th className="px-4 py-3 border-b">PO ID</th>
                                        <th className="px-4 py-3 border-b">Buyer Name</th>
                                        <th className="px-4 py-3 border-b">Supplier Name</th>
                                        <th className="px-4 py-3 border-b text-right">Purchase Value</th>
                                        <th className="px-4 py-3 border-b text-right">Sale Value</th>
                                        <th className="px-4 py-3 border-b text-right">Margin</th>
                                        <th className="px-4 py-3 border-b text-right">Paid Amt</th>
                                        <th className="px-4 py-3 border-b text-center">Status</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {trades.map((t, i) => {
                                        const poId = String(t['PO'] || '').trim();
                                        const totalPaid = paymentsMap[poId] || 0;
                                        return (
                                            <tr key={i} className="hover:bg-slate-50 text-[11px]">
                                                <td className="px-4 py-3 font-mono font-bold text-indigo-600">#{poId}</td>
                                                <td className="px-4 py-3 font-medium text-slate-700">{t['Buyer Name']}</td>
                                                <td className="px-4 py-3 font-medium text-slate-500">{t['sellerName']}</td>
                                                <td className="px-4 py-3 text-right font-mono font-bold text-slate-500 bg-slate-50/50">₹{parseVal(t['Seller Payable(1% - not for all cases)']).toLocaleString()}</td>
                                                <td className="px-4 py-3 text-right font-mono font-bold">₹{parseVal(t['Sale value( Contract/GMV)']).toLocaleString()}</td>
                                                <td className="px-4 py-3 text-right font-mono font-bold text-emerald-600">₹{parseVal(t['Trade Margin']).toLocaleString()}</td>
                                                <td className="px-4 py-3 text-right font-mono font-bold text-indigo-500 bg-indigo-50/30">₹{totalPaid.toLocaleString()}</td>
                                                <td className="px-4 py-3 text-center">
                                                    <span className={`px-2 py-0.5 rounded text-[9px] font-black uppercase ${
                                                        (t['Trade Status'] || '').toLowerCase() === 'closed' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'
                                                    }`}>
                                                        {t['Trade Status']}
                                                    </span>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // --- VIEW 1: PERFORMANCE SUMMARY ---
        const OperationsSummary = ({ data, paymentsMap }) => {
            const [monthFilter, setMonthFilter] = useState('');
            const [abmFilter, setAbmFilter] = useState('');
            const [categoryFilter, setCategoryFilter] = useState('');
            const [drillDown, setDrillDown] = useState({ isOpen: false, title: '', trades: [] });

            const months = useMemo(() => [...new Set(data.map(r => r['GMV Month']))].filter(Boolean).sort(), [data]);
            const abms = useMemo(() => [...new Set(data.map(r => r['Supply Owner_2']))].filter(Boolean).sort(sortABMs), [data]);
            const categories = useMemo(() => [...new Set(data.map(r => r['SKU Category']))].filter(Boolean).sort(), [data]);

            const filteredData = useMemo(() => {
                return data.filter(r => {
                    const mMatch = !monthFilter || r['GMV Month'] === monthFilter;
                    const aMatch = !abmFilter || r['Supply Owner_2'] === abmFilter;
                    const cMatch = !categoryFilter || r['SKU Category'] === categoryFilter;
                    return mMatch && aMatch && cMatch;
                });
            }, [data, monthFilter, abmFilter, categoryFilter]);

            const summaryStats = useMemo(() => {
                return filteredData.reduce((acc, r) => {
                    const status = (r['Trade Status'] || '').toLowerCase().trim();
                    const periodType = getTradePeriodType(r['GMV Month'], r['Trade Month'], monthFilter);
                    if (status === 'closed') {
                        acc.closed++;
                        acc.gmv += parseVal(r['Sale value( Contract/GMV)']);
                        acc.margin += parseVal(r['Trade Margin']);
                    }
                    if (periodType === 'carryforward') acc.carryforward++;
                    if (periodType === 'executed') acc.executed++;
                    return acc;
                }, { gmv: 0, margin: 0, closed: 0, carryforward: 0, executed: 0 });
            }, [filteredData, monthFilter]);

            const tableRows = useMemo(() => {
                const map = {};
                filteredData.forEach(r => {
                    const key = `${r['Supply Owner_2']}||${r['SKU Category']}`;
                    if (!map[key]) {
                        map[key] = { 
                            abm: r['Supply Owner_2'], category: r['SKU Category'], 
                            openItems: [], closedItems: [], cfItems: [], execItems: [],
                            gmv: 0, margin: 0
                        };
                    }
                    const status = (r['Trade Status'] || '').toLowerCase().trim();
                    const periodType = getTradePeriodType(r['GMV Month'], r['Trade Month'], monthFilter);
                    if (status === 'open') map[key].openItems.push(r);
                    if (status === 'closed') {
                        map[key].closedItems.push(r);
                        map[key].gmv += parseVal(r['Sale value( Contract/GMV)']);
                        map[key].margin += parseVal(r['Trade Margin']);
                    }
                    if (periodType === 'carryforward') map[key].cfItems.push(r);
                    if (periodType === 'executed') map[key].execItems.push(r);
                });
                return Object.values(map).sort((a, b) => sortABMs(a.abm, b.abm) || b.gmv - a.gmv);
            }, [filteredData, monthFilter]);

            return (
                <div className="space-y-6">
                    <DrillDownPanel isOpen={drillDown.isOpen} onClose={() => setDrillDown({ ...drillDown, isOpen: false })} title={drillDown.title} trades={drillDown.trades} paymentsMap={paymentsMap} />
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div className="flex flex-wrap gap-4 items-end">
                            <div className="flex-1 min-w-[200px] space-y-2">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Month</label>
                                <select value={monthFilter} onChange={e => setMonthFilter(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                                    <option value="">All Months</option>
                                    {months.map(m => <option key={m} value={m}>{m}</option>)}
                                </select>
                            </div>
                            <div className="flex-1 min-w-[200px] space-y-2">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">ABM</label>
                                <select value={abmFilter} onChange={e => setAbmFilter(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none">
                                    <option value="">All ABMs</option>
                                    {abms.map(a => <option key={a} value={a}>{a}</option>)}
                                </select>
                            </div>
                            <button onClick={() => {setMonthFilter(''); setAbmFilter(''); setCategoryFilter('');}} className="p-3 bg-slate-100 text-slate-400 rounded-xl hover:bg-slate-200">
                                <Icon name="rotate-ccw" />
                            </button>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div className="bg-indigo-600 p-6 rounded-2xl text-white shadow-lg">
                            <p className="text-[10px] font-black uppercase opacity-70">GMV</p>
                            <p className="text-2xl font-black">₹{(summaryStats.gmv / 100000).toFixed(2)}L</p>
                        </div>
                        <div className="bg-emerald-600 p-6 rounded-2xl text-white shadow-lg">
                            <p className="text-[10px] font-black uppercase opacity-70">Margin</p>
                            <p className="text-2xl font-black">₹{(summaryStats.margin / 100000).toFixed(2)}L</p>
                        </div>
                        <div className="bg-slate-800 p-6 rounded-2xl text-white shadow-lg">
                            <p className="text-[10px] font-black uppercase opacity-70">Margin %</p>
                            <p className="text-2xl font-black">{summaryStats.gmv > 0 ? ((summaryStats.margin / summaryStats.gmv) * 100).toFixed(1) : '0'}%</p>
                        </div>
                        <div className="bg-white border p-6 rounded-2xl shadow-sm">
                            <p className="text-[10px] font-black uppercase text-slate-400">Closed</p>
                            <p className="text-2xl font-black text-slate-800">{summaryStats.closed}</p>
                        </div>
                    </div>
                    <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden overflow-x-auto">
                        <table className="w-full text-left border-collapse">
                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest">
                                <tr>
                                    <th className="px-6 py-4">ABM / Category</th>
                                    <th className="px-6 py-4 text-center">Carryforward</th>
                                    <th className="px-6 py-4 text-center">Executed</th>
                                    <th className="px-6 py-4 text-center">Open</th>
                                    <th className="px-6 py-4 text-right">GMV (L)</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y text-xs font-bold text-slate-700">
                                {tableRows.map((row, i) => (
                                    <tr key={i} className="hover:bg-slate-50">
                                        <td className="px-6 py-4">
                                            <div>{row.abm}</div>
                                            <div className="text-[10px] font-medium text-slate-400">{row.category}</div>
                                        </td>
                                        <td className="px-6 py-4 text-center">
                                            <button onClick={() => row.cfItems.length > 0 && setDrillDown({ isOpen: true, title: 'Carryforward', trades: row.cfItems })} className={`font-mono ${row.cfItems.length > 0 ? 'text-rose-600' : 'text-slate-200'}`}>{row.cfItems.length}</button>
                                        </td>
                                        <td className="px-6 py-4 text-center">
                                            <button onClick={() => row.execItems.length > 0 && setDrillDown({ isOpen: true, title: 'Executed', trades: row.execItems })} className={`font-mono ${row.execItems.length > 0 ? 'text-emerald-600' : 'text-slate-200'}`}>{row.execItems.length}</button>
                                        </td>
                                        <td className="px-6 py-4 text-center text-amber-500 font-mono">{row.openItems.length}</td>
                                        <td className="px-6 py-4 text-right font-mono">{(row.gmv / 100000).toFixed(2)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        function App() {
            const [data, setData] = useState([]);
            const [paymentsMap, setPaymentsMap] = useState({});
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyVz_AMFqUPAk7w8-jSo1c0u1E8J-NGAecbFB17ZwZtnXbc2MC4QUqVehkOQBVSwKSRnShOsIna5rl/pub?output=csv";
                fetch(csvUrl).then(res => res.text()).then(text => {
                    const lines = text.split(/\r?\n/).filter(l => l.trim());
                    const parseLine = l => {
                        const res = []; let cur = '', q = false;
                        for (let c of l) { if (c === '"') q = !q; else if (c === ',' && !q) { res.push(cur.trim()); cur = ''; } else cur += c; }
                        res.push(cur.trim()); return res;
                    };
                    const headers = parseLine(lines[0]);
                    const rows = lines.slice(1).map(l => {
                        const v = parseLine(l);
                        const o = {};
                        headers.forEach((h, i) => {
                            o[h] = v[i];
                            // Map essential columns based on your provided spec
                            if (i === 32) o['PO'] = v[i];
                            if (i === 11) o['Buyer Name'] = v[i];
                            if (i === 14) o['sellerName'] = v[i];
                            if (i === 20) o['Sale value( Contract/GMV)'] = v[i];
                            if (i === 22) o['Trade Margin'] = v[i];
                            if (i === 30) o['Trade Status'] = v[i];
                            if (i === 66) o['Payment_PO'] = v[i];
                            if (i === 78) o['Payment_Amount'] = v[i];
                        });
                        return o;
                    });
                    const pMap = {};
                    rows.forEach(r => {
                        const po = String(r['Payment_PO'] || '').trim();
                        const val = parseVal(r['Payment_Amount']);
                        if (po && val > 0) pMap[po] = (pMap[po] || 0) + val;
                    });
                    setPaymentsMap(pMap);
                    setData(rows);
                    setLoading(false);
                });
            }, []);

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-white">
                    <Icon name="refresh-cw" size={32} className="animate-spin text-indigo-600" />
                </div>
            );

            return (
                <div className="min-h-screen">
                    <nav className="bg-white border-b px-8 py-5 sticky top-0 z-50 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white"><Icon name="layout-dashboard" /></div>
                            <h1 className="font-black text-slate-900 uppercase tracking-tighter">Ops Hub</h1>
                        </div>
                        <div className="text-[10px] font-black text-slate-400 bg-slate-100 px-3 py-1 rounded-full uppercase tracking-widest">Live Ledger</div>
                    </nav>
                    <main className="p-8 max-w-[1400px] mx-auto">
                        <OperationsSummary data={data} paymentsMap={paymentsMap} />
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
